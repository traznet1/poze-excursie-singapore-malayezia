<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Excursii Asia</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#0b1020;
      color:#fff;
      text-align:center;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:24px;
    }

    h1{
      margin:10px 0 6px;
      font-size: clamp(26px, 4vw, 44px);
    }

    .sub{
      margin:0 0 14px;
      color:#a8b0c7;
    }

    .nav{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin: 14px 0 18px;
      padding: 0 12px;
    }

    .nav a{
      display:inline-block;
      padding:10px 16px;
      background:#1a2b6a;
      color:#fff;
      text-decoration:none;
      border-radius:10px;
      font-size:15px;
    }

    .nav a:hover{
      background:#2d44a3;
    }

    .card{
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      text-align:left;
    }

    #map{
      height: 420px;
      border-radius: 14px;
      overflow:hidden;
      margin-top: 10px;
    }

    @media (max-width: 520px){
      #map{height: 340px;}
    }

    /* Mobile zoom buttons */
    .map-buttons{
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      gap:8px;
      margin-top:12px;
    }

    .map-buttons button{
      padding:10px 6px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.16);
      background:#1a2b6a;
      color:white;
      font-size:13px;
    }

    .map-buttons button:active{
      transform: scale(0.96);
      background:#2d44a3;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <h1>Călătorii în Asia</h1>
    <p class="sub">Galerii foto + hartă interactivă</p>

    <div class="nav">
      <a href="singapore.html">Singapore</a>
      <a href="langkawi.html">Langkawi</a>
      <a href="kuala-lumpur.html">Kuala Lumpur</a>
      <a href="bangkok.html">Bangkok</a>
      <a href="patong.html">Patong</a>
    </div>

    <div class="card">
      <strong>Hartă</strong>
      <div id="map"></div>

      <div class="map-buttons">
        <button onclick="zoomTo('Singapore')">SG</button>
        <button onclick="zoomTo('Langkawi')">LK</button>
        <button onclick="zoomTo('Kuala Lumpur')">KL</button>
        <button onclick="zoomTo('Bangkok')">BKK</button>
        <button onclick="zoomTo('Patong')">Patong</button>
      </div>

      <p class="sub" style="margin-top:10px;">
        Apasă pe un buton pentru zoom sau pe marker pentru galerie.
      </p>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', { scrollWheelZoom: false }).setView([5, 101], 5);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const places = [
      { name: "Singapore", lat: 1.3521, lon: 103.8198, page: "singapore.html" },
      { name: "Langkawi", lat: 6.3500, lon: 99.8000, page: "langkawi.html" },
      { name: "Kuala Lumpur", lat: 3.1390, lon: 101.6869, page: "kuala-lumpur.html" },
      { name: "Bangkok", lat: 13.7563, lon: 100.5018, page: "bangkok.html" },
      { name: "Patong", lat: 7.8963, lon: 98.2966, page: "patong.html" }
    ];

    const boundsByName = {};

    places.forEach(p => {
      const marker = L.marker([p.lat, p.lon]).addTo(map)
        .bindPopup(`<strong>${p.name}</strong><br><a href="${p.page}">Deschide galeria</a>`);
      boundsByName[p.name] = L.latLngBounds([[p.lat, p.lon]]);
    });
// === ROUTE: Bangkok -> Patong -> Langkawi -> Kuala Lumpur -> Singapore ===
const routeOrder = ["Bangkok", "Patong", "Langkawi", "Kuala Lumpur", "Singapore"];

// ia coordonatele în ordinea de mai sus (din places)
const route = routeOrder
  .map(name => places.find(p => p.name === name))
  .filter(Boolean)
  .map(p => [p.lat, p.lon]);

// linia traseului (subtle)
const routeLine = L.polyline(route, {
  weight: 4,
  opacity: 0.55
}).addTo(map);

// un cerc mic care "merge" pe traseu
const traveler = L.circleMarker(route[0], {
  radius: 6,
  weight: 2,
  opacity: 0.9,
  fillOpacity: 1
}).addTo(map);

// ajutor: interpolare între 2 puncte
function lerp(a, b, t){ return a + (b - a) * t; }

let seg = 0;         // segment index
let t = 0;           // 0..1 pe segment
const speed = 0.008; // mai mare = mai rapid

function animateRoute(){
  if(route.length < 2) return;

  const a = route[seg];
  const b = route[seg + 1];

  // poziție curentă
  const lat = lerp(a[0], b[0], t);
  const lon = lerp(a[1], b[1], t);
  traveler.setLatLng([lat, lon]);

  // avansează
  t += speed;

  if(t >= 1){
    t = 0;
    seg += 1;
    if(seg >= route.length - 1){
      seg = 0; // loop
    }
  }

  requestAnimationFrame(animateRoute);
}

// pornește animația după ce se încarcă tile-urile (mai smooth pe mobil)
setTimeout(animateRoute, 600);

// buton bonus: tap pe linie -> zoom pe tot traseul
routeLine.on('click', () => {
  map.fitBounds(routeLine.getBounds().pad(0.25));
});

    function zoomTo(name){
      if(boundsByName[name]){
        map.setView(boundsByName[name].getCenter(), 9);
      }
    }
  </script>

</body>
</html>
