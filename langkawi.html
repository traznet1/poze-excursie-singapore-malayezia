      background:#0b1020;
      color:white;

    h1{padding:30px 0 10px;margin:0;}

    .nav{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin:0 0 10px;
      padding:0 12px;

      padding:10px 16px;

      color:white;

    .gallery{

      inset:0;
      display:none;
      place-items:center;
      background:rgba(0,0,0,0.85);
      z-index:9999;
    }

    .lightbox.open{display:grid;}

    .lightbox img{
      max-width:95vw;
      max-height:85vh;
      border-radius:14px;
      box-shadow:0 20px 60px rgba(0,0,0,0.6);
      cursor:pointer;

      top:12px;
      right:12px;
      width:44px;
      height:44px;
      border-radius:12px;

      background:rgba(20,20,30,0.7);
      color:white;
      font-size:18px;
      cursor:pointer;
    }

    .lb-btn{
      position:fixed;
      top:50%;
      transform:translateY(-50%);
      width:44px;
      height:44px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.2);
      background:rgba(20,20,30,0.7);
      color:white;
      font-size:24px;
      cursor:pointer;
    }

    .lb-prev{left:12px;}
    .lb-next{right:12px;}

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">✕</button>
  <button class="lb-btn lb-prev" id="lbPrev">‹</button>
  <button class="lb-btn lb-next" id="lbNext">›</button>
  <img id="lbImg">
</div>

<script>
const gallery = document.getElementById('gallery');
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbClose = document.getElementById('lbClose');
const lbPrev = document.getElementById('lbPrev');
const lbNext = document.getElementById('lbNext');

const imgs = Array.from(gallery.querySelectorAll('img'));
let currentIndex = -1;

function openAt(index){
  currentIndex = (index + imgs.length) % imgs.length;
  lbImg.src = imgs[currentIndex].src;
  lightbox.classList.add('open');
}

function closeLb(){
  lightbox.classList.remove('open');
  lbImg.src = "";
}

function next(){ openAt(currentIndex + 1); }
function prev(){ openAt(currentIndex - 1); }

gallery.addEventListener('click', e=>{
  const img = e.target.closest('img');
  if(!img) return;
  openAt(imgs.indexOf(img));
});

lbClose.onclick = closeLb;
lbNext.onclick = e=>{ e.stopPropagation(); next(); };
lbPrev.onclick = e=>{ e.stopPropagation(); prev(); };

document.addEventListener('keydown', e=>{
  if(!lightbox.classList.contains('open')) return;
  if(e.key==="Escape") closeLb();
  if(e.key==="ArrowRight") next();
  if(e.key==="ArrowLeft") prev();
});

let startX = null;

lbImg.addEventListener('touchstart', e=>{
  startX = e.changedTouches[0].clientX;
},{passive:true});

lbImg.addEventListener('touchend', e=>{
  if(startX===null) return;
  const dx = e.changedTouches[0].clientX - startX;
  if(dx < -50) next();
  if(dx > 50) prev();
  startX = null;
},{passive:true});
</script>
