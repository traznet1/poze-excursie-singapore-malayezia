<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Kuala Lumpur</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: white;
      text-align: center;
    }

    h1 { padding: 30px 0 10px; margin: 0; }

    .nav {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 0 0 10px;
      padding: 0 12px;
    }

    .nav a {
      display: inline-block;
      padding: 10px 16px;
      background: #1a2b6a;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 16px;
    }

    .nav a:hover { background: #2d44a3; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 12px;
      cursor: zoom-in;
    }

    @media (max-width: 520px) {
      .gallery img { height: 180px; }
    }

    .lightbox {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(0,0,0,0.78);
      z-index: 9999;
    }

    .lightbox.open { display: grid; }

    .lightbox img {
      max-width: 96vw;
      max-height: 88vh;
      border-radius: 14px;
    }

    .lb-close {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(20,20,30,0.65);
      color: white;
      border: none;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Kuala Lumpur</h1>

  <div class="nav">
    <a href="index.html">← Home</a>
    <a href="singapore.html">Singapore</a>
    <a href="langkawi.html">Langkawi</a>
    <a href="kuala-lumpur.html">Kuala Lumpur</a>
  </div>

  <div class="gallery" id="gallery">

    <img src="images/kuala-lumpur/20260119_115747_result.jpg">
    <img src="images/kuala-lumpur/20260119_125641_result.jpg">
    <img src="images/kuala-lumpur/20260119_130817(0)_result.jpg">
    <img src="images/kuala-lumpur/20260119_165700_result.jpg">
    <img src="images/kuala-lumpur/20260119_165706_result.jpg">
    <img src="images/kuala-lumpur/20260119_165821_result.jpg">
    <img src="images/kuala-lumpur/20260119_170542_result.jpg">
    <img src="images/kuala-lumpur/20260119_170854_result.jpg">
    <img src="images/kuala-lumpur/20260119_170902_result.jpg">

  </div>

  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose">✕</button>
    <img id="lbImg">
  </div>

  <script>
    const gallery = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbClose = document.getElementById('lbClose');

    gallery.addEventListener('click', (e) => {
      const img = e.target.closest('img');
      if (!img) return;
      lbImg.src = img.src;
      lightbox.classList.add('open');
    });

    lbClose.addEventListener('click', () => lightbox.classList.remove('open'));

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) lightbox.classList.remove('open');
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') lightbox.classList.remove('open');
    });
  </script>

</body>
</html>
